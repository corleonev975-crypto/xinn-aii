<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xinn AI</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs/themes/prism-tomorrow.min.css">
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="overlay" class="overlay"></div>

  <aside id="sidebar" class="sidebar">
    <div class="sidebar-head">
      <h2>Xinn AI</h2>
      <button id="closeSidebarBtn" class="close-btn">×</button>
    </div>

    <button id="newChatBtn" class="side-btn">+ New Chat</button>
    <button id="historyBtn" class="side-btn">Riwayat Chat</button>
    <button id="settingsBtn" class="side-btn">Settings</button>
  </aside>

  <header class="topbar">
    <button id="menuBtn" class="icon-btn">☰</button>
    <h1>Xinn AI</h1>
    <button id="moreBtn" class="icon-btn">⋮</button>

    <div id="moreMenu" class="dropdown">
      <button id="clearChatBtn">Clear Chat</button>
      <button id="exportChatBtn">Export Chat</button>
      <button id="themeBtn">Toggle Theme</button>
      <button id="aboutBtn">About</button>
    </div>
  </header>

  <main id="chatArea" class="chat-area">
    <section id="welcome" class="welcome">
      <div class="avatar-wrap">
        <div class="avatar-x">X</div>
      </div>
      <h2>XINN AI</h2>
      <h1>Apa yang bisa saya bantu?</h1>
      <p>Tanyakan coding, desain, debugging, atau ide apa pun.</p>
    </section>
  </main>

  <footer class="input-wrap">
    <div id="plusMenu" class="plus-menu">
      <label>📷 Foto <input id="photoInput" type="file" accept="image/*" hidden></label>
      <label>📸 Kamera <input id="cameraInput" type="file" accept="image/*" capture="environment" hidden></label>
      <label>📁 File <input id="fileInput" type="file" hidden></label>
    </div>

    <div id="filePreview" class="file-preview"></div>

    <div class="chat-input">
      <button id="plusBtn" class="plus-btn">+</button>
      <textarea id="messageInput" placeholder="Ketik pesan ke Xinn AI..." rows="1"></textarea>
      <button id="sendBtn" class="send-btn">➤</button>
    </div>

    <p class="warning">Xinn AI dapat membuat kesalahan. Periksa informasi penting.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/prism.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-markup.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-css.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-javascript.min.js"></script>
  <script src="./script.js"></script>
</body>
</html>
