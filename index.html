<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xinn AI</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs/themes/prism-tomorrow.min.css">
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <aside id="sidebar" class="sidebar">
    <div class="side-head">
      <button id="closeSidebarBtn" class="icon-btn mobile-only">×</button>
      <h2>Xinn AI</h2>
    </div>

    <button id="newChatBtn" class="new-chat">＋ New Chat</button>

    <div class="history-title">Riwayat</div>
    <div id="historyList" class="history-list"></div>
  </aside>

  <div id="overlay" class="overlay"></div>

  <section class="app">
    <header class="topbar">
      <button id="menuBtn" class="icon-btn">☰</button>
      <div class="title">Xinn AI</div>
      <button id="moreBtn" class="icon-btn">⋮</button>

      <div id="moreMenu" class="dropdown">
        <button id="clearChatBtn">🗑 Clear Chat</button>
        <button id="exportChatBtn">⬇ Export Chat</button>
        <button id="themeBtn">☀ Mode Terang</button>
        <button id="aboutBtn">ⓘ About</button>
      </div>
    </header>

    <main id="chatArea" class="chat-area">
      <section id="welcome" class="welcome">
        <div class="avatar-wrap">
          <img src="./avatar.gif" class="welcome-avatar" alt="Xinn AI">
        </div>
        <h1>Apa yang bisa saya bantu?</h1>
        <p>Xinn AI siap membantu anda</p>
      </section>
    </main>

    <footer class="input-wrap">
      <div id="plusMenu" class="plus-menu">
        <label>🖼 Foto <input id="photoInput" type="file" accept="image/*" hidden></label>
        <label>📷 Kamera <input id="cameraInput" type="file" accept="image/*" capture="environment" hidden></label>
        <label>📁 File <input id="fileInput" type="file" hidden></label>
      </div>

      <div class="chat-input">
        <button id="plusBtn" class="plus-btn">+</button>
        <textarea id="messageInput" placeholder="Ketik pesan..." rows="1"></textarea>
        <button id="sendBtn" class="send-btn">➤</button>
      </div>
      <p class="warning">BY XINN AI </p>
    </footer>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/prism.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-markup.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-css.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-python.min.js"></script>
  <script src="./script.js"></script>
</body>
</html>
