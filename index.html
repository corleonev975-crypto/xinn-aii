<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xinn AI</title>

  <!-- Prism Theme -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs/themes/prism-tomorrow.min.css">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="topbar">
    <h1>Xinn AI</h1>
  </header>

  <main id="chatArea" class="chat-area"></main>

  <footer class="input-wrap">
    <div class="chat-input">
      <textarea id="messageInput" placeholder="Ketik pesan..." rows="1"></textarea>
      <button id="sendBtn">➤</button>
    </div>
  </footer>

  <!-- LIBRARY -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/prism.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-markup.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-css.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-javascript.min.js"></script>

  <script src="script.js"></script>
</body>
</html>
